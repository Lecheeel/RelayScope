<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Probe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>API Probe</h1>
        <p>模拟 Codex 与 Claude Code 客户端，检测中转的协议兼容性、PDF、缓存、usage 和计费风险。</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-sm btn-outline-secondary" id="settingsButton" type="button">设置</button>
        <div class="status" id="statusText">待检测</div>
      </div>
    </header>

    <div class="layout">
      <section class="form-panel" aria-label="probe form">
        <form id="probeForm">
          <div class="field">
            <label for="baseUrl">API URL</label>
            <input id="baseUrl" name="base_url" type="url" required placeholder="https://relay.example.com/v1">
          </div>
          <div class="field">
            <label for="apiKey">Key</label>
            <input id="apiKey" name="api_key" type="password" required autocomplete="off" placeholder="sk-...">
          </div>
          <div class="field">
            <label for="clientProfile">测试客户端</label>
            <select id="clientProfile" name="profile">
              <option value="auto">默认：Codex + Claude Code</option>
              <option value="codex-responses">只测 Codex</option>
              <option value="claude-code">只测 Claude Code</option>
              <option value="openai-chat">高级：OpenAI Chat</option>
              <option value="anthropic-messages">高级：Anthropic Messages</option>
            </select>
          </div>
          <div class="field">
            <label for="modelName">模型（可选）</label>
            <input id="modelName" name="model" type="text" autocomplete="off" placeholder="留空则自动获取模型列表">
          </div>
          <button id="runButton" type="submit">开始检测</button>
          <p class="fine-print">Key 只发送到本机后端用于本次请求，不写入报告文件。</p>
        </form>
      </section>

      <section class="results" aria-live="polite">
        <div id="resultRoot" class="empty">
          <p>输入 URL 和 Key 后开始检测。</p>
        </div>
      </section>
    </div>
  </main>

  <div id="modelModal" class="model-backdrop" role="dialog" aria-modal="true" aria-labelledby="modelModalTitle">
    <div class="model-dialog">
      <div class="modal-head">
        <h2 id="modelModalTitle">选择模型</h2>
        <button id="closeModelModal" class="close-button" type="button" aria-label="关闭">×</button>
      </div>
      <div id="modelList" class="model-list"></div>
    </div>
  </div>

  <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen-xl-down modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h2 class="modal-title fs-5" id="detailModalTitle">测试项详情</h2>
            <div class="text-secondary small" id="detailModalSubtitle"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body" id="detailModalBody"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalTitle" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="settingsModalTitle">设置</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" for="settingTimeout">请求超时（秒）</label>
            <input class="form-control" id="settingTimeout" type="number" min="10" max="240" step="1">
          </div>
          <div class="mb-3">
            <label class="form-label" for="settingConcurrency">并发探针数</label>
            <input class="form-control" id="settingConcurrency" type="number" min="1" max="8" step="1">
            <div class="form-text">首个身份/元数据探针固定先跑；后续探针按该值并发。</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="saveSettingsButton">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
